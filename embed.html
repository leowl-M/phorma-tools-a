<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Phorma Tools - Embed</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
      }
      #logoContainer {
        width: 100%;
        height: 100%;
        position: relative;
        background: transparent;
      }
      #canvasMount {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }
    </style>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  </head>
  <body>
    <!-- Hidden UI elements with same default values as index.html -->
    <div style="display: none;">
      <select id="localFont">
        <option value="">(Seleziona un font)</option>
      </select>
      <textarea id="text">PHORMA</textarea>
      <input type="range" id="fontSize" min="24" max="640" value="140" />
      <input type="range" id="jitter" min="0" max="19" step="1" value="1" />
      <input type="range" id="contrastAmount" min="-100" max="100" step="1" value="0" />
      <input type="range" id="contrastBalance" min="-1" max="1" step="0.05" value="0" />
      <input type="range" id="contrastAngle" min="0" max="365" step="1" value="1" />
      <input type="range" id="contrastMix" min="0" max="1.20" step="0.01" value="0.10" />
      <input type="range" id="contrastSharpness" min="0" max="1" step="0.01" value="0" />
      <input type="range" id="contrastClamp" min="0" max="1" step="0.01" value="1" />
      <input type="range" id="curvSegments" min="1" max="24" step="1" value="8" />
      <input type="range" id="curvAngleSnap" min="0" max="90" step="1" value="90" />
      <input type="range" id="curvTolerance" min="0" max="8" step="0.1" value="0" />
      <input type="range" id="shapeSides" min="3" max="12" step="1" value="6" />
      <input type="range" id="shapeRadius" min="0.1" max="1.2" step="0.05" value="0.35" />
      <input type="range" id="shapeInner" min="0" max="1" step="0.01" value="0.4" />
      <input type="range" id="shapeSpacing" min="4" max="80" step="1" value="22" />
      <input type="range" id="shapeTwist" min="-180" max="180" step="1" value="0" />
      <input type="color" id="fillColor" value="#000000" />
      <input type="color" id="strokeColor" value="#000000" />
      <input type="range" id="strokeWeight" min="0" max="16" step="1" value="8" />
      <input type="checkbox" id="fxContrast" checked />
      <input type="checkbox" id="fxCurvCrush" checked />
      <input type="checkbox" id="shapeFollow" checked />
      <input type="checkbox" id="useKerning" checked />
      <input type="checkbox" id="autoHint" checked />
      <input type="checkbox" id="animate" />
      <select id="lineJoin">
        <option value="round" selected>Round</option>
      </select>
      <select id="lineCap">
        <option value="round" selected>Round</option>
      </select>
      <!-- Value display elements -->
      <span id="fontSizeVal">140</span>
      <span id="jitterVal">1</span>
      <span id="contrastAmountVal">0</span>
      <span id="contrastBalanceVal">0</span>
      <span id="contrastAngleVal">1</span>
      <span id="contrastMixVal">0.10</span>
      <span id="curvSegmentsVal">8</span>
      <span id="curvAngleSnapVal">90</span>
      <span id="shapeSidesVal">6</span>
      <span id="shapeRadiusVal">0.35</span>
      <span id="shapeInnerVal">0.4</span>
      <span id="shapeSpacingVal">22</span>
      <span id="shapeTwistVal">0</span>
      <span id="strokeWeightVal">8</span>
    </div>

    <div id="logoContainer">
      <div id="canvasMount"></div>
    </div>

    <!-- libs -->
    <script src="https://cdn.jsdelivr.net/npm/p5@1.9.2/lib/p5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/opentype.js@1.3.4/dist/opentype.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
